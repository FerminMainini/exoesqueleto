<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exoesqueleto Neumático 3D</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050a10;color:#c8e0f0;font-family:'Rajdhani',sans-serif;overflow:hidden;width:100vw;height:100vh}

#canvas-wrap{position:fixed;inset:0;z-index:0}
#canvas-wrap canvas{width:100%!important;height:100%!important}

/* ── TOP BAR ── */
#topbar{
  position:fixed;top:0;left:0;right:0;z-index:20;
  height:52px;
  background:rgba(2,6,14,0.92);
  border-bottom:1px solid rgba(77,200,255,0.15);
  display:flex;align-items:center;padding:0 24px;gap:20px;
  backdrop-filter:blur(8px);
}
#topbar .logo{
  font-family:'Share Tech Mono',monospace;
  font-size:10px;color:rgba(77,200,255,0.6);letter-spacing:3px;
  text-transform:uppercase;white-space:nowrap;
}
#topbar h1{
  font-family:'Share Tech Mono',monospace;
  font-size:15px;font-weight:400;color:#fff;letter-spacing:1px;
}
#topbar h1 span{color:#4dc8ff}
#topbar .spacer{flex:1}
#btn-back{
  display:none;
  background:transparent;
  border:1px solid rgba(77,200,255,0.3);
  color:#4dc8ff;
  padding:6px 16px;
  border-radius:4px;
  font-family:'Share Tech Mono',monospace;
  font-size:10px;letter-spacing:1px;
  cursor:pointer;
  transition:all 0.2s;
}
#btn-back:hover{background:rgba(77,200,255,0.1);border-color:#4dc8ff}
#btn-back.show{display:block}

/* ── HINT ── */
#hint{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
  z-index:20;
  font-family:'Share Tech Mono',monospace;font-size:11px;
  color:rgba(77,200,255,0.4);letter-spacing:2px;
  text-align:center;
  transition:opacity 0.5s;
  pointer-events:none;
}

/* ── INFO PANEL ── */
#panel{
  position:fixed;right:0;top:52px;bottom:0;
  width:320px;z-index:20;
  background:rgba(2,8,18,0.93);
  border-left:1px solid rgba(77,200,255,0.12);
  display:flex;flex-direction:column;
  transform:translateX(100%);
  transition:transform 0.45s cubic-bezier(0.4,0,0.2,1);
  backdrop-filter:blur(12px);
}
#panel.open{transform:translateX(0)}

#panel-head{
  padding:20px 20px 16px;
  border-bottom:1px solid rgba(77,200,255,0.1);
  flex-shrink:0;
}
#panel-sys{font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(77,200,255,0.4);letter-spacing:2px;margin-bottom:6px}
#panel-title{font-family:'Share Tech Mono',monospace;font-size:15px;color:#fff;line-height:1.2;margin-bottom:4px}
#panel-tag{font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px}

#panel-body{flex:1;overflow-y:auto;padding:18px 20px;scrollbar-width:thin;scrollbar-color:rgba(77,200,255,0.2) transparent}

.badge{
  display:inline-flex;align-items:center;gap:5px;
  border:1px solid;border-radius:20px;
  padding:3px 10px;margin-bottom:14px;
  font-family:'Share Tech Mono',monospace;font-size:9px;letter-spacing:1px;
}
.badge::before{content:'●';font-size:7px;animation:bl 1s infinite}
@keyframes bl{0%,100%{opacity:1}50%{opacity:0.2}}
.b-pneu{color:#4dc8ff;border-color:rgba(77,200,255,0.3)}
.b-sens{color:#ffb84d;border-color:rgba(255,184,77,0.3)}
.b-safe{color:#ff5050;border-color:rgba(255,80,80,0.3)}
.b-stru{color:#3dffa0;border-color:rgba(61,255,160,0.3)}

.desc{font-size:14px;line-height:1.7;color:#a0c4d8;margin-bottom:14px}
.desc strong{color:#4dc8ff;font-weight:600}
.desc em{color:#ffb84d;font-style:normal}

.specs{border:1px solid rgba(77,200,255,0.1);border-radius:6px;overflow:hidden;margin-bottom:14px}
.sr{display:flex;border-bottom:1px solid rgba(77,200,255,0.08);font-family:'Share Tech Mono',monospace;font-size:11px}
.sr:last-child{border-bottom:none}
.sk{padding:8px 10px;color:rgba(77,200,255,0.5);width:54%;border-right:1px solid rgba(77,200,255,0.08);background:rgba(0,0,0,0.2)}
.sv{padding:8px 10px;color:#e0f0ff;width:46%}

.ibox{background:rgba(77,200,255,0.06);border:1px solid rgba(77,200,255,0.15);border-radius:6px;padding:10px 12px;font-size:13px;color:#6ab8d4;margin-top:10px;line-height:1.6}
.wbox{background:rgba(255,80,80,0.06);border:1px solid rgba(255,80,80,0.2);border-radius:6px;padding:10px 12px;font-size:13px;color:#ff9090;margin-top:10px;line-height:1.6}
.algo{display:flex;gap:8px;padding:7px 10px;border-left:2px solid #4dc8ff;margin-bottom:6px;background:rgba(77,200,255,0.04);border-radius:0 4px 4px 0;font-size:13px;line-height:1.5;color:#a0c4d8}
.an{font-family:'Share Tech Mono',monospace;color:#4dc8ff;font-size:11px;flex-shrink:0;padding-top:1px}

/* ── CROSSHAIR CURSOR when hoverable ── */
body.hovering{cursor:pointer}

/* ── LOADING ── */
#loading{
  position:fixed;inset:0;z-index:100;
  background:#050a10;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
}
#loading .ltext{font-family:'Share Tech Mono',monospace;font-size:12px;color:rgba(77,200,255,0.5);letter-spacing:3px}
#loading .bar{width:200px;height:2px;background:rgba(77,200,255,0.1);border-radius:2px;overflow:hidden}
#loading .bar-fill{height:100%;background:#4dc8ff;width:0%;transition:width 0.3s;border-radius:2px}

/* ── LEGEND ── */
#legend{
  position:fixed;bottom:20px;right:20px;z-index:20;
  display:flex;flex-direction:column;gap:6px;
  background:rgba(2,8,18,0.8);
  border:1px solid rgba(77,200,255,0.1);
  border-radius:6px;padding:10px 14px;
  backdrop-filter:blur(8px);
}
.li{display:flex;align-items:center;gap:7px;font-family:'Share Tech Mono',monospace;font-size:9px;color:rgba(77,200,255,0.5)}
.ld{width:8px;height:8px;border-radius:2px;flex-shrink:0}
</style>
</head>
<body>

<div id="loading">
  <div class="ltext">CARGANDO MODELO 3D</div>
  <div class="bar"><div class="bar-fill" id="lbar"></div></div>
  <div class="ltext" id="lstep" style="font-size:10px">Iniciando motor gráfico...</div>
</div>

<div id="canvas-wrap"></div>

<div id="topbar">
  <div class="logo">Exposición Neumática</div>
  <h1>Exoesqueleto <span>Neumático</span> — Tren Inferior</h1>
  <div class="spacer"></div>
  <button id="btn-back" onclick="goBack()">← VOLVER</button>
</div>

<div id="hint">ROTÁ · HACÉ SCROLL · CLICKEÁ UNA PARTE</div>

<div id="panel">
  <div id="panel-head">
    <div id="panel-sys">// COMPONENTE SELECCIONADO</div>
    <div id="panel-title">—</div>
    <div id="panel-tag"></div>
  </div>
  <div id="panel-body" id="pbody"></div>
</div>

<div id="legend">
  <div class="li"><div class="ld" style="background:#4dc8ff"></div>Neumático</div>
  <div class="li"><div class="ld" style="background:#3dffa0"></div>Válvulas/Control</div>
  <div class="li"><div class="ld" style="background:#ffb84d"></div>Sensores</div>
  <div class="li"><div class="ld" style="background:#ff5050"></div>Seguridad</div>
  <div class="li"><div class="ld" style="background:#607090"></div>Estructura</div>
</div>

<!-- Three.js r128 -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─────────────────────────────────────────────
//  LOADING PROGRESS
// ─────────────────────────────────────────────
let loadPct = 0;
const lbar = document.getElementById('lbar');
const lstep = document.getElementById('lstep');
function setLoad(pct, msg){ loadPct=pct; lbar.style.width=pct+'%'; if(msg) lstep.textContent=msg; }

// ─────────────────────────────────────────────
//  PART DATA
// ─────────────────────────────────────────────
const PARTS = {
  cinturon:    { title:'CINTURÓN PÉLVICO',     tag:'// Estructura · Soporte',                 tagColor:'#3dffa0', badge:'b-stru', badgeTxt:'ESTRUCTURA PRINCIPAL',
    desc:'El cinturón pélvico es el punto de anclaje al cuerpo. Fabricado en <strong>aluminio aeronáutico 6061</strong> o fibra de carbono, distribuye el peso sin comprimir la zona lumbar. Aloja el módulo de control y la batería LiPo.',
    specs:[['Material','Al 6061 / Fibra de C.'],['Peso total sist.','&lt; 12 kg'],['Fijación','Velcro + Hebillas'],['Integra','Arduino + LiPo']], extra:'' },
  tanque:      { title:'TANQUE CO₂',            tag:'// Fuente neumática primaria',             tagColor:'#8888ff', badge:'b-pneu', badgeTxt:'FUENTE NEUMÁTICA',
    desc:'El corazón del sistema. Tanques <strong>tipo Paintball de CO₂</strong> a 200–300 bar. Al pasar por el regulador, la presión baja a 4–8 bar utilizables. La alternativa es un <em>micro-compresor</em> LiPo para autonomía continua.',
    specs:[['Presión almac.','200–300 bar'],['Presión trabajo','4–8 bar'],['Autonomía','~60–90 min'],['Alternativa','Micro-compresor LiPo']],
    extra:'<div class="ibox">La neumática es preferida sobre la hidráulica porque es <strong>más liviana</strong> y el movimiento es más suave — protege las articulaciones del paciente.</div>' },
  regulador:   { title:'REGULADOR DE PRESIÓN', tag:'// Control neumático · 200→8 bar',         tagColor:'#4dc8ff', badge:'b-pneu', badgeTxt:'COMPONENTE NEUMÁTICO',
    desc:'Reduce la presión del tanque (200+ bar) a un nivel seguro y útil. Sin él, los cilindros se dañarían. Incluye <strong>manómetro</strong> y válvula de alivio automática.',
    specs:[['Entrada','200–300 bar'],['Salida regulada','4–8 bar'],['Protección','Válvula de alivio'],['Monitoreo','Manómetro digital']], extra:'' },
  valvulas:    { title:'ELECTROVÁLVULAS SOLENOIDES', tag:'// Control neumático · 5/2 vías',    tagColor:'#3dffa0', badge:'b-pneu', badgeTxt:'CONTROL NEUMÁTICO CLAVE',
    desc:'El cerebro físico del sistema. Un <strong>electroimán (solenoide)</strong> abre o cierra el paso del aire al recibir señal del Arduino. Válvulas <strong>5/2 vías</strong>: 5 puertos, 2 posiciones. Controlan extensión Y retracción del cilindro.',
    specs:[['Tipo','Solenoide 5/2 vías'],['Voltaje','12–24 V DC'],['Tiempo resp.','&lt; 50 ms'],['Cantidad','4 (2 por pierna)']],
    extra:'<div class="ibox">Cada válvula controla una cámara del cilindro de doble efecto. Su sincronización genera el ciclo de marcha.</div>' },
  cilindro:    { title:'CILINDROS DE DOBLE EFECTO', tag:'// Actuador neumático principal',     tagColor:'#4dc8ff', badge:'b-pneu', badgeTxt:'ACTUADOR PRINCIPAL',
    desc:'Los "músculos artificiales". Los de <strong>doble efecto</strong> tienen dos entradas: una para <strong>extender</strong> y otra para <strong>retraer</strong>. La <em>compresibilidad del aire</em> amortigua impactos — ventaja clave sobre la hidráulica.',
    specs:[['Tipo','Doble efecto'],['Carrera','100–140 mm'],['Fuerza @ 6 bar','hasta 500 N'],['Config.','2 cilindros por pierna']], extra:'' },
  rodilla:     { title:'ARTICULACIÓN RODILLA',  tag:'// Junta mecánica · 0°–120°',              tagColor:'#4dc8ff', badge:'b-stru', badgeTxt:'ARTICULACIÓN MECÁNICA',
    desc:'Pivote de <strong>1 grado de libertad</strong>. Topes mecánicos limitan el rango a <strong>0°–120°</strong> para evitar hiperextensión. El cilindro del muslo mueve esta articulación directamente.',
    specs:[['Rango','0°–120° flexión'],['Material','Al + Acero inox.'],['Protección','Topes anti-retorno'],['Actuada por','Cilindro muslo']], extra:'' },
  tobillo:     { title:'ARTICULACIÓN TOBILLO',  tag:'// Pasiva · Resorte de retorno',           tagColor:'#4dc8ff', badge:'b-stru', badgeTxt:'ARTICULACIÓN PASIVA',
    desc:'Puede ser <strong>pasiva</strong> (resorte de retorno, más simple) o activa (cilindro adicional). Permite dorsiflexión y plantiflexión (±20°) para adaptarse a terreno irregular.',
    specs:[['Tipo','Pasivo (resorte)'],['Rango','±20° flexión'],['Función','Absorción impacto'],['Adaptación','Terreno irregular']], extra:'' },
  fsr:         { title:'SENSORES FSR DE PRESIÓN', tag:'// Detección contacto con suelo',        tagColor:'#ffb84d', badge:'b-sens', badgeTxt:'SENSOR DE CONTACTO',
    desc:'FSR = <em>Force Sensitive Resistor</em>. Cambian su resistencia según la presión. Bajo el talón y metatarso detectan cuándo el pie toca el suelo y <strong>cuándo querés moverte</strong>.',
    specs:[['Posición','Talón + Metatarso'],['Rango','0.1–100 N'],['Cantidad','4 (2 por pie)'],['Señal','Analógica 0–5V']],
    extra:'<div class="ibox">Si talón tiene presión pero no la punta → detecta un escalón. Esta diferencia activa el modo precaución.</div>' },
  sonar:       { title:'SENSOR ULTRASÓNICO',    tag:'// Escalones y desniveles',                tagColor:'#ffb84d', badge:'b-sens', badgeTxt:'SENSOR DE ENTORNO',
    desc:'Emite pulsos ultrasónicos y mide el tiempo de retorno. Distancia <strong>aumenta bruscamente</strong> → escalón para bajar. <strong>Disminuye</strong> → obstáculo. Frena si el desnivel es &gt;15 cm.',
    specs:[['Modelo','HC-SR04 / ToF'],['Rango','2–400 cm'],['Precisión','±3 mm'],['Detecta','Escalones + Rampas']],
    extra:'<div class="wbox">⚠️ Desnivel &gt;15 cm → alerta vibrotáctil + frena el ciclo neumático automáticamente.</div>' },
  imu:         { title:'IMU / INCLINÓMETRO',    tag:'// Intención de movimiento',               tagColor:'#9060ff', badge:'b-sens', badgeTxt:'DETECCIÓN DE INTENCIÓN',
    desc:'Combina <strong>acelerómetro + giroscopio</strong> (6 ejes) para medir la orientación del torso. Cuando el usuario se inclina hacia adelante — como al arrancar a caminar — el Arduino inicia el ciclo.',
    specs:[['Ejes','6 DOF (3A + 3G)'],['Ejemplo','MPU-6050'],['Comunicación','I²C / SPI'],['Frecuencia','100–1000 Hz']], extra:'' },
  arduino:     { title:'ARDUINO (CONTROLADOR)', tag:'// Cerebro · Algoritmo de marcha',          tagColor:'#3dffa0', badge:'b-stru', badgeTxt:'UNIDAD DE CONTROL',
    desc:'Lee todos los sensores y controla las electroválvulas siguiendo el <strong>ciclo de marcha</strong>:',
    specs:[['Plataforma','Arduino Mega / RPi'],['Control','PID + Lógica marcha'],['Entradas','IMU, FSR, Sonar'],['Salidas','4 electroválvulas']],
    algo:['IMU detecta inclinación → inicio','Sonar verifica terreno','Apoyo: cilindro der. presuriza','FSR confirma contacto suelo','Balanceo: cilindro izq. contrae','Sincronización → repite ciclo'], extra:'' },
  panico:      { title:'BOTÓN DE PÁNICO',       tag:'// Seguridad crítica · ISO 13482',          tagColor:'#ff5050', badge:'b-safe', badgeTxt:'SEGURIDAD CRÍTICA',
    desc:'Al presionarlo, válvulas de escape rápido vacían <em>todo</em> el aire en &lt;2 segundos. Con cilindros sin presión → <strong>modo pasivo total</strong>. El usuario puede moverse o ser asistido sin resistencia.',
    specs:[['Tiempo escape','&lt; 2 segundos'],['Tipo','Mecánico + Eléctrico'],['Resultado','Modo pasivo total'],['Norma','Obligatorio ISO 13482']],
    extra:'<div class="wbox">🚨 Todo exoesqueleto certificado DEBE incluir este sistema. Sin él no puede usarse con pacientes.</div>' },
};

function showPanel(key){
  const d=PARTS[key]; if(!d) return;
  document.getElementById('panel-title').textContent=d.title;
  const tag=document.getElementById('panel-tag'); tag.textContent=d.tag; tag.style.color=d.tagColor;
  let html=`<div class="badge ${d.badge}">${d.badgeTxt}</div>`;
  html+=`<p class="desc">${d.desc}</p>`;
  if(d.algo){
    d.algo.forEach((s,i)=>{ html+=`<div class="algo"><span class="an">${['①','②','③','④','⑤','⑥'][i]}</span>${s}</div>`; });
    html+='<div style="margin-bottom:14px"></div>';
  }
  if(d.specs){
    html+='<div class="specs">';
    d.specs.forEach(([k,v])=>{ html+=`<div class="sr"><div class="sk">${k}</div><div class="sv">${v}</div></div>`; });
    html+='</div>';
  }
  if(d.extra) html+=d.extra;
  document.getElementById('panel-body').innerHTML=html;
  document.getElementById('panel').classList.add('open');
  document.getElementById('btn-back').classList.add('show');
  document.getElementById('hint').style.opacity='0';
}

// ─────────────────────────────────────────────
//  THREE.JS SCENE
// ─────────────────────────────────────────────
const wrap = document.getElementById('canvas-wrap');
const W = ()=>window.innerWidth, H = ()=>window.innerHeight;

const renderer = new THREE.WebGLRenderer({ antialias:true, alpha:false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio,2));
renderer.setSize(W(),H());
renderer.shadowMap.enabled=true;
renderer.shadowMap.type=THREE.PCFSoftShadowMap;
renderer.toneMapping=THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure=1.1;
renderer.outputEncoding=THREE.sRGBEncoding;
wrap.appendChild(renderer.domElement);

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x050a10);
scene.fog = new THREE.FogExp2(0x050a10, 0.018);

const camera = new THREE.PerspectiveCamera(45, W()/H(), 0.01, 200);
camera.position.set(0, 1.5, 5.5);

setLoad(10,'Configurando iluminación...');

// ── LIGHTS ──
const ambient = new THREE.AmbientLight(0x112233, 0.8);
scene.add(ambient);

const dirLight = new THREE.DirectionalLight(0x4488cc, 1.6);
dirLight.position.set(3,8,5);
dirLight.castShadow=true;
dirLight.shadow.mapSize.set(2048,2048);
dirLight.shadow.camera.near=0.1; dirLight.shadow.camera.far=50;
dirLight.shadow.camera.left=-6; dirLight.shadow.camera.right=6;
dirLight.shadow.camera.top=8; dirLight.shadow.camera.bottom=-4;
scene.add(dirLight);

const rimLight = new THREE.DirectionalLight(0x002244, 0.8);
rimLight.position.set(-4,2,-5);
scene.add(rimLight);

const fillLight = new THREE.PointLight(0x003366, 1.2, 20);
fillLight.position.set(-2,3,2);
scene.add(fillLight);

// Blue accent floor light
const groundLight = new THREE.PointLight(0x00aaff, 0.4, 8);
groundLight.position.set(0,-2,0);
scene.add(groundLight);

// ── MATERIALS ──
const M = {};

// Brushed aluminum
M.alu = new THREE.MeshStandardMaterial({
  color:0x8899aa, metalness:0.9, roughness:0.25,
  envMapIntensity:1.0
});
// Dark structural aluminum
M.aluDark = new THREE.MeshStandardMaterial({
  color:0x445566, metalness:0.85, roughness:0.3
});
// Cyan emissive (pneumatic highlight)
M.cyan = new THREE.MeshStandardMaterial({
  color:0x1a6688, metalness:0.7, roughness:0.2,
  emissive:0x004466, emissiveIntensity:0.4
});
// Green (valve/control)
M.green = new THREE.MeshStandardMaterial({
  color:0x1a5530, metalness:0.6, roughness:0.3,
  emissive:0x002210, emissiveIntensity:0.3
});
// Glowing green valve light
M.greenGlow = new THREE.MeshStandardMaterial({
  color:0x3dffa0, metalness:0.3, roughness:0.2,
  emissive:0x00ff60, emissiveIntensity:1.2
});
// Red (safety/panic)
M.red = new THREE.MeshStandardMaterial({
  color:0xcc1111, metalness:0.4, roughness:0.3,
  emissive:0x880000, emissiveIntensity:0.6
});
// Orange sensor
M.orange = new THREE.MeshStandardMaterial({
  color:0xcc5511, metalness:0.4, roughness:0.4,
  emissive:0x441100, emissiveIntensity:0.4
});
// Yellow sensor
M.yellow = new THREE.MeshStandardMaterial({
  color:0xccaa11, metalness:0.3, roughness:0.4,
  emissive:0x443300, emissiveIntensity:0.3
});
// Purple IMU
M.purple = new THREE.MeshStandardMaterial({
  color:0x553399, metalness:0.5, roughness:0.3,
  emissive:0x220066, emissiveIntensity:0.5
});
// Dark body
M.dark = new THREE.MeshStandardMaterial({
  color:0x111820, metalness:0.5, roughness:0.5
});
// PCB green
M.pcb = new THREE.MeshStandardMaterial({
  color:0x0a2a10, metalness:0.2, roughness:0.6,
  emissive:0x001005, emissiveIntensity:0.5
});
// Hose - cyan rubber
M.hose = new THREE.MeshStandardMaterial({
  color:0x1a5070, metalness:0.3, roughness:0.7
});
// Tank body
M.tank = new THREE.MeshStandardMaterial({
  color:0x334466, metalness:0.9, roughness:0.15
});
// Joint chrome
M.chrome = new THREE.MeshStandardMaterial({
  color:0xaabbcc, metalness:0.95, roughness:0.08
});
// Black rubber
M.rubber = new THREE.MeshStandardMaterial({
  color:0x111111, metalness:0.1, roughness:0.9
});

setLoad(25,'Construyendo geometrías...');

// ─────────────────────────────────────────────
//  GEOMETRY HELPERS
// ─────────────────────────────────────────────
function box(w,h,d,mat,rx=0,ry=0,rz=0){
  const g=new THREE.BoxGeometry(w,h,d);
  const m=new THREE.Mesh(g,mat);
  m.rotation.set(rx,ry,rz);
  m.castShadow=true; m.receiveShadow=true;
  return m;
}
function cyl(rt,rb,h,mat,segs=20){
  const g=new THREE.CylinderGeometry(rt,rb,h,segs);
  const m=new THREE.Mesh(g,mat);
  m.castShadow=true; m.receiveShadow=true;
  return m;
}
function sphere(r,mat,sw=24,sh=16){
  const g=new THREE.SphereGeometry(r,sw,sh);
  const m=new THREE.Mesh(g,mat);
  m.castShadow=true;

//  ORBIT CONTROLS (manual, lightweight)
// ─────────────────────────────────────────────
let isDragging=false, prevX=0, prevY=0;
let theta=0, phi=0.35, radius=5.5;
let targetTheta=0, targetPhi=0.35, targetRadius=5.5;
let autoRotate=true, autoTimer=0;

// Default camera target
const camTarget=new THREE.Vector3(0,1.2,0);
let targetCamTarget=new THREE.Vector3(0,1.2,0);

renderer.domElement.addEventListener('mousedown',e=>{
  isDragging=true; prevX=e.clientX; prevY=e.clientY; autoRotate=false;
});
renderer.domElement.addEventListener('mousemove',e=>{
  if(!isDragging) return;
  const dx=e.clientX-prevX, dy=e.clientY-prevY;
  targetTheta-=dx*0.008; targetPhi-=dy*0.006;
  targetPhi=Math.max(0.05,Math.min(Math.PI/2,targetPhi));
  prevX=e.clientX; prevY=e.clientY;
});
renderer.domElement.addEventListener('mouseup',()=>{ isDragging=false; });
renderer.domElement.addEventListener('wheel',e=>{
  targetRadius+=e.deltaY*0.005;
  targetRadius=Math.max(1.5,Math.min(10,targetRadius));
  autoRotate=false;
},{passive:true});

// Touch support
renderer.domElement.addEventListener('touchstart',e=>{
  if(e.touches.length===1){isDragging=true; prevX=e.touches[0].clientX; prevY=e.touches[0].clientY; autoRotate=false;}
},{passive:true});
renderer.domElement.addEventListener('touchmove',e=>{
  if(!isDragging||e.touches.length!==1) return;
  const dx=e.touches[0].clientX-prevX, dy=e.touches[0].clientY-prevY;
  targetTheta-=dx*0.008; targetPhi-=dy*0.006;
  targetPhi=Math.max(0.05,Math.min(Math.PI/2,targetPhi));

},{passive:true});

// ─────────────────────────────────────────────
//  RAYCASTING / CLICK
// ─────────────────────────────────────────────
const raycaster=new THREE.Raycaster();
const mouse=new THREE.Vector2();
let hoveredMesh=null;
const originalMaterials=new Map();

// Store originals
meshMap.forEach((key,mesh)=>{ originalMaterials.set(mesh,mesh.material); });

function highlightMesh(mesh,on){
  if(!mesh||!mesh.isMesh) return;
  if(on){
    if(!originalMaterials.has(mesh)) originalMaterials.set(mesh,mesh.material);
    const h=mesh.material.clone();
    h.emissive=new THREE.Color(0x4dc8ff); h.emissiveIntensity=0.8;
    mesh.material=h;
  } else {
    if(originalMaterials.has(mesh)) mesh.material=originalMaterials.get(mesh);
  }
}

// Collect all meshes for raycasting
function getAllMeshes(){
  const meshes=[];
  meshMap.forEach((key,mesh)=>{ meshes.push(mesh); });
  return meshes;
}

renderer.domElement.addEventListener('mousemove',e=>{
  mouse.x=(e.clientX/W())*2-1;
  mouse.y=-(e.clientY/H())*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(getAllMeshes(),false);
  const hit=hits.length>0?hits[0].object:null;
  if(hit!==hoveredMesh){
    if(hoveredMesh) highlightMesh(hoveredMesh,false);
    hoveredMesh=hit;
    if(hoveredMesh) highlightMesh(hoveredMesh,true);
  }
  document.body.classList.toggle('hovering',!!hoveredMesh);
});

renderer.domElement.addEventListener('click',e=>{
  mouse.x=(e.clientX/W())*2-1;
  mouse.y=-(e.clientY/H())*2+1;
  raycaster.setFromCamera(mouse,camera);
  const hits=raycaster.intersectObjects(getAllMeshes(),false);
  if(hits.length>0){
    const key=meshMap.get(hits[0].object);
    if(key){
      const wp=hits[0].object.getWorldPosition(new THREE.Vector3());
      zoomTo(wp,key);
      showPanel(key);
    }
  }
});

function zoomTo(worldPos,key){
  const z=ZOOM_OFFSETS[key]||{r:3,ph:0.35,th:0};
  targetCamTarget.copy(worldPos);
  targetRadius=z.r;
  targetPhi=z.ph;
  targetTheta=z.th;
  zoomedIn=true;
  autoRotate=false;
}

// ─────────────────────────────────────────────
//  ANIMATION LOOP
// ─────────────────────────────────────────────
const clock=new THREE.Clock();
let frameCount=0;

function animate(){
  requestAnimationFrame(animate);
  const dt=clock.getDelta();
  frameCount++;

  // Auto-rotate
  if(autoRotate && !isDragging){
    autoTimer+=dt;
    targetTheta=Math.sin(autoTimer*0.15)*0.3;
    targetPhi=0.3+Math.sin(autoTimer*0.08)*0.05;
    targetRadius=5.5;
  }

  // Smooth camera
  theta+=(targetTheta-theta)*0.07;
  phi+=(targetPhi-phi)*0.07;
  radius+=(targetRadius-radius)*0.07;
  camTarget.lerp(targetCamTarget,0.07);

  camera.position.set(
    camTarget.x + radius*Math.sin(phi)*Math.sin(theta),
    camTarget.y + radius*Math.cos(phi),
    camTarget.z + radius*Math.sin(phi)*Math.cos(theta)
  );
  camera.lookAt(camTarget);

  // Animate valve glows
  const t=clock.getElapsedTime();
  valvGrp.traverse(c=>{
    if(c.isMesh && c.material && c.material.emissiveIntensity!==undefined && c.geometry.type==='SphereGeometry'){
      c.material.emissiveIntensity=0.5+Math.sin(t*3+c.position.x*10)*0.5;
    }
  });

  // Animate panic button
  panicGrp.traverse(c=>{
    if(c.isPointLight) c.intensity=0.4+Math.sin(t*2)*0.4;
  });

  renderer.render(scene,camera);
}

window.addEventListener('resize',()=>{
  camera.aspect=W()/H();
  camera.updateProjectionMatrix();
  renderer.setSize(W(),H());
});

setLoad(100,'¡Listo!');
setTimeout(()=>{
  document.getElementById('loading').style.opacity='0';
  setTimeout(()=>document.getElementById('loading').style.display='none',600);
  setTimeout(()=>{ autoRotate=true; },100);
},400);

animate();
</script>
</body>
</html>
